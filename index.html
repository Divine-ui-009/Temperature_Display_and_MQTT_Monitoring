<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Temperature Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
:root{
  --bg:#0a0f1c;
  --panel:#121a2b;
  --panel-2:#0f1726;
  --accent:#38bdf8;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --ok:#22c55e;
  --bad:#ef4444;
  --warn:#facc15;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui, -apple-system, Segoe UI, Arial;
  background: radial-gradient(circle at top, #111827, var(--bg));
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 15px;
}

/* Header */
.header{
  text-align:center;
  margin-bottom:25px;
}

.header h1{
  margin:0;
  font-size:1.6rem;
  letter-spacing:0.5px;
}

.header p{
  margin-top:6px;
  color:var(--muted);
  font-size:0.9rem;
}

/* Status pill */
.status{
  margin-top:10px;
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:0.8rem;
  transition:0.3s;
  border:1px solid transparent;
}

.status.ok{background:rgba(34,197,94,0.12); color:var(--ok); border-color:rgba(34,197,94,0.3);}
.status.bad{background:rgba(239,68,68,0.12); color:var(--bad); border-color:rgba(239,68,68,0.3);}
.status.wait{background:rgba(250,204,21,0.12); color:var(--warn); border-color:rgba(250,204,21,0.3);}

/* Main dashboard */
.dashboard{
  width:360px;
  background:linear-gradient(180deg, var(--panel), var(--panel-2));
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

/* Temperature */
.temp{
  font-size:4rem;
  font-weight:700;
  text-align:center;
  color:var(--accent);
  margin:10px 0 5px;
  letter-spacing:1px;
}

.label{
  text-align:center;
  font-size:0.85rem;
  color:var(--muted);
}

/* Info grid */
.info{
  margin-top:20px;
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.info-box{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  padding:10px 12px;
  border-radius:12px;
  font-size:0.8rem;
  color:var(--muted);
}

.info-box span{
  color:var(--text);
  font-weight:500;
}

/* Log */
#log{
  margin-top:20px;
  width:360px;
  max-height:180px;
  overflow-y:auto;
  border-radius:12px;
  background:#0b1220;
  border:1px solid rgba(255,255,255,0.06);
  padding:10px;
  font-family:monospace;
  font-size:0.75rem;
}

#log div{
  padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
  color:#93c5fd;
}

/* subtle animation */
.temp{
  transition:all 0.3s ease;
}
</style>
</head>

<body>

<div class="header">
  <h1>Temperature Monitoring</h1>
  <p>Live IoT Stream Dashboard</p>
  <div class="status wait" id="statusLine">Connecting...</div>
</div>

<div class="dashboard">
  <div class="temp" id="tempValue">--°C</div>
  <div class="label">Current Temperature</div>

  <div class="info">
    <div class="info-box">Topic: <span id="topicLabel"></span></div>
    <div class="info-box">Last Update: <span id="lastUpdate">never</span></div>
  </div>
</div>

<div id="log"></div>

<script>
const WS_URL = "wss://broker.benax.rw:9002/mqtt";
const MQTT_TOPIC = "sensor_irasubiza_divine";

document.getElementById("topicLabel").textContent = MQTT_TOPIC;

const tempEl = document.getElementById("tempValue");
const statusEl = document.getElementById("statusLine");
const logEl = document.getElementById("log");
const lastUpdateEl = document.getElementById("lastUpdate");

function setStatus(text, type){
  statusEl.textContent = text;
  statusEl.className = "status " + type;
}

function log(msg){
  const div = document.createElement("div");
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.prepend(div);
}

const client = mqtt.connect(WS_URL, {
  reconnectPeriod: 2000
});

client.on("connect", () => {
  setStatus("Connected", "ok");
  log("Connected to MQTT broker");
  client.subscribe(MQTT_TOPIC);
});

client.on("reconnect", () => setStatus("Reconnecting...", "wait"));

client.on("error", (e) => {
  setStatus("Connection Error", "bad");
  log(e.message);
});

client.on("message", (topic, payload) => {
  const value = payload.toString();

  tempEl.textContent = value + "°C";
  lastUpdateEl.textContent = new Date().toLocaleTimeString();

  log(`Temperature: ${value}°C`);
});
</script>

</body>
</html>
